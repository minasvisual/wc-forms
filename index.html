<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width">
  <title>Web Components Forms</title>
  <script type="module">
    import { Config } from './src/config.js'
    import { FormCurrency } from './src/inputs/custominput.js'

    if (location.href.includes('github.io'))
      Config.basePath = '/wc-forms/src'

    // Custom validation
    Config.registerValidation('custom', {
      message: (params, value) => `This field must quals ${params[0]}`,
      handle: ({ value, params }) => value == params[0]
    })
    // Custom input
    Config.registerInput('currency', FormCurrency)

    // Custom mask
    Config.registerMask('document', (el, maskInstance, maskInputAttribute) => {
      var docMask = ['999.999.999-999', '99.999.999/9999-99'];
      var inputHandler = (masks, max, event) => {
        var c = event.target;
        var v = c.value.replace(/\D/g, '');
        var m = c.value.length > max ? 1 : 0;
        maskInstance.unMask();
        maskInstance.maskPattern(masks[m]);
      }
      maskInstance.maskPattern(docMask[0]);
      el.addEventListener('input', inputHandler.bind(undefined, docMask, 14), false);
    })

  </script>
  <script type="module" src="https://cdn.skypack.dev/twind/shim"></script>
  <script type="module" src="./src/index.js" defer async></script>

  <style>
    /* Exemplo de customização de estilo para os componentes */
    :root {
      --wcf-input-radius: 5px;
    }

    /* Customização através de Shadow Parts */
    form-input::part(input) {
      border: 1px solid #cbd5e1;
      border-radius: var(--wcf-input-radius);
      transition: all 0.2s ease;
    }

    form-input::part(input):focus {
      border-color: #3b82f6;
      outline: none;
      box-shadow: 0 0 0 1px #3b82f6;
    }

    form-input::part(help) {
      font-style: italic;
      color: #64748b;
    }
  </style>
</head>

<body class="bg-gray-50 flex h-screen overflow-hidden font-sans">

  <!-- Lateral Menu -->
  <aside class="w-64 bg-white border-r border-gray-200 flex-shrink-0 flex flex-col overflow-y-auto">
    <div class="p-6 border-b border-gray-100">
      <h2 class="text-xl font-bold text-gray-800">WC Forms</h2>
      <p class="text-sm text-gray-500 mt-1">Component Examples</p>
    </div>
    <nav class="flex-1 p-4">
      <ul class="space-y-2">
        <li>
          <a href="./index.html" class="block px-4 py-2 rounded-lg bg-blue-50 text-blue-700 font-medium">Complete
            Form</a>
        </li>
        <li>
          <a href="./examples/index.html"
            class="block px-4 py-2 rounded-lg text-gray-600 hover:bg-gray-100 hover:text-gray-900 transition-colors">React
            18</a>
        </li>
        <li>
          <a href="./examples/vue.html"
            class="block px-4 py-2 rounded-lg text-gray-600 hover:bg-gray-100 hover:text-gray-900 transition-colors">Vue
            3</a>
        </li>
        <li>
          <a href="./examples/vanila.html"
            class="block px-4 py-2 rounded-lg text-gray-600 hover:bg-gray-100 hover:text-gray-900 transition-colors">Vanilla
            JS</a>
        </li>
        <li>
          <a href="./examples/todo.html"
            class="block px-4 py-2 rounded-lg text-gray-600 hover:bg-gray-100 hover:text-gray-900 transition-colors">Alpine
            To-Do</a>
        </li>
        <li>
          <a href="./examples/slots.html"
            class="block px-4 py-2 rounded-lg text-gray-600 hover:bg-gray-100 hover:text-gray-900 transition-colors">Slots</a>
        </li>
      </ul>
    </nav>
  </aside>

  <!-- Main Content -->
  <main class="flex-1 overflow-y-auto p-6 md:p-10">
    <form is="form-control"
      class="max-w-3xl m-auto flex flex-col gap-4 p-8 bg-white shadow-xl rounded-2xl border border-gray-100">
      <form-input name="textField" type="text" label="Text field" validations="required|minlen:5">
        <span slot="label">
          <h1 style="color:red">Text field 1 Custom label slot</h1>
        </span>
        <span slot="suffix"><button type="button" class="border-2 px-2">Suffix</button></span>
      </form-input>
      <form-input name="emailField" type="email" label="Email field" validations="required|email" help="Help attribute">
      </form-input>
      <form-input name="passwordField" type="password" label="Password field"
        validations="required|minlen:5|maxlen:50|confirm:textField">
      </form-input>
      <form-input name="selectField" type="select" validations="required|in:2,3,5" label="Select field" options="[
        {'value': '', 'label': 'Select an option'},
        {'value': 1, 'label': 'Option 1'},
        {'value': 2, 'label': 'Option 2'},
        {'value': 3, 'label': 'Option 3'},
        {'value': 4, 'label': 'Option 4'},
        {'value': 5, 'label': 'Option 5'},
        {'value': 6, 'label': 'Option 6'},
        {'value': 7, 'label': 'Option 7'},
        {'value': 8, 'label': 'Option 8'},
        {'value': 9, 'label': 'Option 9'},
        {'value': 10, 'label': 'Option 10'}
      ]">
      </form-input>
      <form-input name="dateField" type="date" label="Date field"
        validations="required|isdate|isafter:2026-01-01|isbefore:2026-12-31">
      </form-input>
      <form-input name="numberField" type="number" label="Number" validations="required|isnumber|min:5|max:100">
      </form-input>
      <form-input name="radioboxesField" type="radioboxes" validations="required|in:radio2,radio3"
        label="Radioboxes field" options="['radio1','radio2','radio3']">
      </form-input>
      <form-input name="checkboxField" type="checkboxes" validations="required|in:check2" label="Checkboxes field"
        options="['check1','check2','check3']">
      </form-input>
      <form-input name="textareaField" type="textarea" rows="5" validations="required|maxlen:255|minlen:5"
        label="Textarea field">
      </form-input>
      <form-input name="urlField" type="url" label="Url field" validations="required|url"
        placeholder="ex. https://domain.com">
      </form-input>
      <form-input name="searchField" type="search" label="Search field" validations="required|minlen:5">
      </form-input>
      <form-input name="colorField" type="color" label="Color field" validations="required|custom:#ffffff">
      </form-input>
      <form-input name="dateTimeField" type="datetime-local" label="Date time"
        validations="required|isdate|isafter:2026-01-01|isbefore:2026-12-31">
      </form-input>
      <form-input name="booleanField" type="checkbox" validations="required|istrue" label="Checkbox boolean field">
      </form-input>
      <form-input name="checkboxValueField" type="checkbox" value="optin">
        <span slot="label">
          <h1 style="color:red">Checkbox value field with custom label slot</h1>
        </span>
      </form-input>
      <form-input name="currencyField" type="currency" label="Custom field type" validations="required">
      </form-input>
      <form-input name="maskField" type="text" label="Mask field" validations="required" mask mask:format="currency">
      </form-input>
      <form-input name="maskFieldUnmaskedReturn" type="text" label="Mask field unmasked return" validations="required"
        mask="(99) 99999-9999" unmask="true">
      </form-input>
      <form-input name="customMaskField" type="text" label="Custom mask" mask mask:format="document"
        validations="required">
      </form-input>
      <form-input name="autocompleteField" type="autocomplete" label="Autocomplete field (JSON Objects)" options='[
          {"label": "Option 1", "value": 1},
          {"label": "Option 2", "value": 2},
          {"label": "Option 3", "value": 3}
        ]' help="Digite 'Option' para ver sugestões" validations="required">
      </form-input>
      <form-input name="autocompleteHtmlField" type="autocomplete" label="Autocomplete field (HTML Options)"
        help="Digite 'Opção' para ver sugestões" validations="required">
        <option value="1">Opção 1</option>
        <option value="2">Opção 2</option>
        <option value="3">Opção 3</option>
      </form-input>
      <button class="border-2 border-black bg-zinc-300 p-2">
        Enter
      </button>
    </form>

  </main>
  <!-- <script src="../src/mask.js"></script> -->
  <script src="./examples/scripts.js"></script>
</body>

</html>
